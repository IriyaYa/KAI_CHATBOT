<div class="login-page">

  <div class="login-card">
    

    <h1 class="login-card__title">Вход в систему</h1>

    <form class="login-form" (ngSubmit)="onSubmit()" novalidate>

      <div class="field" [class.field--filled]="login">
        <label class="field__label" for="login-input">Имя пользователя</label>
        <input
          id="login-input"
          class="field__input"
          type="text"
          [(ngModel)]="login"
          name="login"
          autocomplete="username"
          [disabled]="loading()"
        >
      </div>

      <div class="field" [class.field--filled]="password">
        <label class="field__label" for="pass-input">Пароль</label>
        <div class="field__row">
          <input
            id="pass-input"
            class="field__input"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            [disabled]="loading()"
          >
          <button
            type="button"
            class="field__eye"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Скрыть пароль' : 'Показать пароль'"
          >
            @if (!showPassword) {
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            } @else {
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div class="login-error" role="alert">{{ error() }}</div>
      }

      <button class="login-btn" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="login-btn__spinner"></span> Вход...
        } @else {
          Войти в систему
        }
      </button>

    </form>

    <div class="login-card__logo">

      <span class="login-card__logo-text">АУРА</span>
    </div>
  </div>
</div>
